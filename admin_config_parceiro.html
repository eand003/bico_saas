<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador PRO - Spray Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-family: 'Outfit'; text-align: center; color: #0f172a; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        label { font-size: 12px; font-weight: 700; color: #64748b; display: block; margin-bottom: 5px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #0f172a; color: white; }
        .btn-accent { background: #00d2ff; color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Painel Admin v2.0</h1>
        
        <!-- LOGIN (Sempre visível se não houver usuário) -->
        <div id="loginSection">
            <p style="text-align:center; font-size:13px; color:#64748b; margin-bottom:20px;">🔒 Identifique-se para configurar bicos.</p>
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="pass" placeholder="Sua senha">
            <button class="btn btn-primary" onclick="login()">Entrar no Painel</button>
        </div>

        <!-- CONFIGURAÇÃO (Oculta por padrão) -->
        <div id="configSection" style="display:none;">
            <p id="userEmail" style="text-align:center; font-weight:700; color:green; margin-bottom:20px;"></p>
            
            <label>Nome da Loja</label>
            <input type="text" id="p_name">
            
            <label>Cor (Ex: #ff0000 para vermelho)</label>
            <input type="text" id="p_color" placeholder="#00d2ff">
            
            <label>Link do Logo (Imagem PNG)</label>
            <input type="text" id="p_logo">
            
            <label>WhatsApp da Loja</label>
            <input type="text" id="p_wa">

            <button class="btn btn-accent" id="btnSave" onclick="save()">💾 Salvar Tudo</button>
            <button onclick="logout()" style="width:100%; margin-top:20px; background:none; border:none; color:red; cursor:pointer; font-size:12px;">Desconectar / Sair</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjouahzglomvvcfpxtuq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qb3VhaHpnbG9tdnZjZnB4dHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU3OTIsImV4cCI6MjA5MDIxMTc5Mn0.6SgPDABbRknn42mx1CnM67_P8O3Z7tqIGmQ7tn-M_bo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function check() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('configSection').style.display = 'block';
                document.getElementById('userEmail').innerText = "Logado: " + user.email;
                
                if (user.user_metadata) {
                    const m = user.user_metadata;
                    document.getElementById('p_name').value = m.partner_name || '';
                    document.getElementById('p_color').value = m.partner_color || '';
                    document.getElementById('p_logo').value = m.partner_logo || '';
                    document.getElementById('p_wa').value = m.partner_whatsapp || '';
                }
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('configSection').style.display = 'none';
            }
        }

        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const { error } = await supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Erro: " + error.message);
            else check();
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        async function save() {
            const btn = document.getElementById('btnSave');
            btn.innerText = "Gravando..."; btn.disabled = true;

            const config = {
                partner_name: document.getElementById('p_name').value,
                partner_color: document.getElementById('p_color').value,
                partner_logo: document.getElementById('p_logo').value,
                partner_whatsapp: document.getElementById('p_wa').value,
                is_enterprise: true
            };

            const { error } = await supabase.auth.updateUser({ data: config });
            if (error) alert("Erro ao salvar: " + error.message);
            else alert("SUCESSO! Dados salvos no banco.");
            
            btn.innerText = "💾 Salvar Tudo"; btn.disabled = false;
        }

        check();
    </script>
</body>
</html>
