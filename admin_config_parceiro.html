<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador PRO - Spray Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #00d2ff; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: 40px; }
        h1 { font-family: 'Outfit'; font-size: 28px; text-align: center; margin-bottom: 30px; color: var(--primary); letter-spacing: -1px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 15px; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--accent); outline: none; background: #fff; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 12px; font-weight: bold; margin-bottom: 20px; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Identidade Visual</h1>
        <div id="status" style="background:#f1f5f9; color:#64748b;">🔐 Módulo de Segurança Ativo</div>

        <!-- LOGIN AREA -->
        <div id="loginArea">
            <div class="form-group">
                <label>E-mail Corporativo</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Sua Senha</label>
                <input type="password" id="pass" placeholder="••••••••">
            </div>
            <button class="btn" id="btnLogin" onclick="handleLogin()">ENTRAR NO PAINEL</button>
        </div>

        <!-- CONFIG AREA -->
        <div id="configArea" style="display:none;">
            <div class="form-group">
                <label>Nome da Loja / Revenda</label>
                <input type="text" id="p_name" placeholder="Ex: Agro Mato Grosso">
            </div>
            <div class="form-group">
                <label>Cor da Marca (HEX)</label>
                <input type="text" id="p_color" placeholder="#00d2ff">
            </div>
            <div class="form-group">
                <label>Link do Logo (Imagem PNG)</label>
                <input type="url" id="p_logo" placeholder="https://imgur.com/seulogo.png">
            </div>
            <div class="form-group">
                <label>WhatsApp de Vendas</label>
                <input type="tel" id="p_wa" placeholder="5565999998888">
            </div>
            <button class="btn" style="background: #16a34a;" id="btnSave" onclick="handleSave()">💾 SALVAR NO BANCO</button>
            <p style="text-align:center; margin-top:20px;">
                <a href="./enterprise/index.html" style="color:#64748b; font-size:12px; font-weight:700;">&larr; Abrir App Enterprise</a><br>
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-size:11px; margin-top:10px;">Desconectar</button>
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'https://mjouahzglomvvcfpxtuq.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qb3VhaHpnbG9tdnZjZnB4dHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU3OTIsImV4cCI6MjA5MDIxMTc5Mn0.6SgPDABbRknn42mx1CnM67_P8O3Z7tqIGmQ7tn-M_bo';
        let ACCESS_TOKEN = "";

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btnLogin');

            if (!email || !password) return alert("Preencha e-mail e senha.");
            
            btn.innerText = "Conectando..."; btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error_description || data.error);
                
                ACCESS_TOKEN = data.access_token;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('configArea').style.display = 'block';
                status.innerText = "✅ CONEXÃO ESTABELECIDA";
                status.style.background = "#dcfce7";
                status.style.color = "#166534";
                
                const meta = data.user.user_metadata || {};
                document.getElementById('p_name').value = meta.partner_name || '';
                document.getElementById('p_color').value = meta.partner_color || '';
                document.getElementById('p_logo').value = meta.partner_logo || '';
                document.getElementById('p_wa').value = meta.partner_whatsapp || '';
                
            } catch (err) {
                alert("Erro ao entrar: " + err.message);
                btn.innerText = "ENTRAR NO PAINEL"; btn.disabled = false;
            }
        }

        async function handleSave() {
            const btn = document.getElementById('btnSave');
            const meta = {
                partner_name: document.getElementById('p_name').value,
                partner_color: document.getElementById('p_color').value,
                partner_logo: document.getElementById('p_logo').value,
                partner_whatsapp: document.getElementById('p_wa').value,
                is_enterprise: true
            };

            btn.innerText = "Gravando Dados..."; btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/v1/user`, {
                    method: 'PUT',
                    headers: {
                        'apikey': ANON_KEY,
                        'Authorization': `Bearer ${ACCESS_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ data: meta })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                alert("PARABÉNS! Estilo salvo com sucesso em nível de banco de dados.");
            } catch (err) {
                alert("Erro ao salvar: " + err.message);
            } finally {
                btn.innerText = "💾 SALVAR NO BANCO"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
