<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panfleto Balcão | Spray Precision PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#0b1622;
  padding:20px;
}
.flyer{
  max-width:900px;
  margin:auto;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
}
.top{
  padding:28px;
  background:linear-gradient(135deg,#004b63,#00d2ff);
  color:#fff;
}
.top h1{
  font-family:'Outfit',sans-serif;
  font-size:42px;
  line-height:1;
}
.top p{
  margin-top:10px;
  font-size:16px;
}
.blocks{
  display:grid;
  grid-template-columns:1fr 1fr;
}
.block{
  padding:22px;
  border-bottom:1px solid #eee;
  border-right:1px solid #eee;
}
.block:nth-child(2n){
  border-right:none;
}
.block h2{
  font-family:'Outfit';
  font-size:20px;
  margin-bottom:8px;
}
.block p{
  font-size:14px;
  color:#555;
}
.visual{
  text-align:center;
  padding:20px;
}
.visual img{
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
}
.footer{
  padding:24px;
  text-align:center;
  background:#0f172a;
  color:#fff;
}
.footer h3{
  font-family:'Outfit';
  font-size:26px;
}
.footer p{
  margin-top:10px;
  font-size:14px;
  color:#cbd5e1;
}
@media(max-width:700px){
  .blocks{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="flyer">

<div class="top">
  <h1>VENDA MAIS PONTAS</h1>
  <p>com argumento técnico no balcão</p>
</div>

<div class="blocks">

<div class="block">
  <h2>SEM APP</h2>
  <p>Vende o que o cliente pede.</p>
</div>

<div class="block">
  <h2>COM APP</h2>
  <p>Vende o que a operação precisa.</p>
</div>

<div class="block">
  <h2>APP NO BALCÃO</h2>
  <p>Mostra qual ponta atende.</p>
  <div class="visual">
    <img src="landing/exemplo_resultado_app.jpeg">
  </div>
</div>

<div class="block">
  <h2>LAUDO NO WHATS</h2>
  <p>Reforça a venda.</p>
  <div class="visual">
    <img src="landing/laudo.jpeg">
  </div>
</div>

</div>

<div class="footer">
  <h3>Não é só vender ponta.</h3>
  <p>É vender a recomendação certa.</p>
</div>

</div>

</body>
</html>
