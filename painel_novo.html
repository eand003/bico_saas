<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Configurator</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f6; padding: 20px; }
        .box { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; background: #0f172a; color: white; }
    </style>
</head>
<body>

    <div class="box">
        <h2 id="title">🔐 Área do Parceiro</h2>
        <div id="status" style="font-size:12px; color: grey;">Status: Inicializando...</div>

        <!-- LOGIN -->
        <div id="loginArea">
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="pass" placeholder="Sua senha">
            <button class="btn" onclick="doLogin()">ACESSAR PAINEL</button>
        </div>

        <!-- CONFIG -->
        <div id="configArea" style="display:none;">
            <p style="color: green; font-weight: 700;">✅ Logado como Administrador</p>
            <input type="text" id="p_name" placeholder="Nome da Revenda">
            <input type="text" id="p_color" placeholder="Cor Hex (ex: #ffaa00)">
            <input type="text" id="p_logo" placeholder="URL do Logo">
            <input type="text" id="p_wa" placeholder="WhatsApp Vendedor">
            <button class="btn" style="background:#16a34a;" onclick="doSave()">SALVAR TODAS AS MUDANÇAS</button>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-size:11px; margin-top:20px; text-decoration: underline;">Desconectar / Sair</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjouahzglomvvcfpxtuq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qb3VhaHpnbG9tdnZjZnB4dHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU3OTIsImV4cCI6MjA5MDIxMTc5Mn0.6SgPDABbRknn42mx1CnM67_P8O3Z7tqIGmQ7tn-M_bo';
        let supabase;

        // Função de Inicialização (Forçável)
        function getSupabase() {
            if (supabase) return supabase;
            if (typeof window.supabase === 'undefined') {
                alert("ERRO: A biblioteca principal não carregou. Tente abrir em outro navegador (Edge ou Firefox) ou use aba anônima.");
                return null;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return supabase;
        }

        async function doLogin() {
            const client = getSupabase();
            if (!client) return;

            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if (!e || !p) return alert("Erro: E-mail e senha são obrigatórios.");

            try {
                document.getElementById('status').innerText = "Status: Conectando...";
                const { data, error } = await client.auth.signInWithPassword({ email: e, password: p });
                
                if (error) {
                    alert("Acesso Negado: " + error.message);
                    document.getElementById('status').innerText = "Status: Erro";
                } else {
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('configArea').style.display = 'block';
                    document.getElementById('status').innerText = "Status: Dashboard Ativado";
                    
                    const m = data.user.user_metadata || {};
                    document.getElementById('p_name').value = m.partner_name || '';
                    document.getElementById('p_color').value = m.partner_color || '';
                    document.getElementById('p_logo').value = m.partner_logo || '';
                    document.getElementById('p_wa').value = m.partner_whatsapp || '';
                }
            } catch (err) {
                alert("Erro inesperado: " + err.message);
            }
        }

        async function doSave() {
            const client = getSupabase();
            if (!client) return;

            const m = {
                partner_name: document.getElementById('p_name').value,
                partner_color: document.getElementById('p_color').value,
                partner_logo: document.getElementById('p_logo').value,
                partner_whatsapp: document.getElementById('p_wa').value,
                is_enterprise: true
            };

            const { error } = await client.auth.updateUser({ data: m });
            if (error) alert("Não foi possível salvar: " + error.message);
            else alert("✅ SUCESSO ABSOLUTO! Dados salvos no banco. Já pode fechar o painel e abrir o Enterprise.");
        }

        // Tenta checar sessão se já estiver logado
        window.onload = async () => {
            const client = getSupabase();
            if (client) {
                const { data: { user } } = await client.auth.getUser();
                if (user) {
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('configArea').style.display = 'block';
                    document.getElementById('status').innerText = "Status: Sessão Ativa";
                } else {
                    document.getElementById('status').innerText = "Status: Pronto para Login";
                }
            }
        };
    </script>
</body>
</html>
