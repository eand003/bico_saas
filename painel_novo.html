<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Dashboard v5 - Spray Precision</title>
    <!-- MUDANÇA DE SERVIDOR: Cloudflare (Mais estável e fura bloqueios) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.7/supabase.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; text-align: center; }
        .box { background: white; max-width: 420px; margin: auto; padding: 35px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 2px solid #e2e8f0; }
        h1 { color: #0f172a; margin-bottom: 25px; font-size: 24px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; background: #0f172a; color: white; margin-top: 15px; }
        #log { font-size: 11px; margin-top: 20px; font-weight: 700; color: #64748b; padding: 10px; background: #f1f5f9; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 Painel de Segurança v5</h1>
        <div id="log">Aguardando motor...</div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <input type="email" id="email" placeholder="Seu e-mail cadastrado">
            <input type="password" id="pass" placeholder="Sua senha">
            <button class="btn" onclick="doAction('login')">🔓 ACESSAR PAINEL</button>
        </div>

        <!-- CONFIG FORM -->
        <div id="configForm" style="display:none;">
            <p style="color: #16a34a; font-weight: 800; margin-bottom: 20px;">🛡️ MODO CONFIGURAÇÃO ATIVO</p>
            <input type="text" id="p_name" placeholder="Nome da Loja">
            <input type="text" id="p_color" placeholder="Cor (Ex: #ff0000)">
            <input type="text" id="p_logo" placeholder="URL do Logo">
            <input type="text" id="p_wa" placeholder="WhatsApp">
            <button class="btn" style="background:#10b981;" onclick="doAction('save')">💾 GRAVAR NO SUPABASE</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#ef4444; font-size:12px; margin-top:20px; font-weight:700; cursor:pointer;">SAIR DO PAINEL</button>
        </div>

        <!-- BOTÃO DE EMERGÊNCIA (Aparece se falhar) -->
        <div id="panicBtn" style="display:none; margin-top:20px;">
            <p style="color:red; font-size:12px;">O motor não carregou. Clique abaixo se estiver no celular.</p>
            <button onclick="checkEngine(true)" style="padding:10px; background:red; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">FORÇAR MOTOR MANUAMENTE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjouahzglomvvcfpxtuq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qb3VhaHpnbG9tdnZjZnB4dHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU3OTIsImV4cCI6MjA5MDIxMTc5Mn0.6SgPDABbRknn42mx1CnM67_P8O3Z7tqIGmQ7tn-M_bo';
        
        let engine;
        const logger = document.getElementById('log');

        function checkEngine(force = false) {
            if (typeof window.supabase !== 'undefined') {
                engine = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                logger.innerText = "🔋 MOTOR LIGADO: Pronto para agir.";
                logger.style.color = "blue";
                return true;
            } else {
                logger.innerText = "🚨 ERRO: BIBLIOTECA BLOQUEADA NA SUA REDE.";
                logger.style.color = "red";
                document.getElementById('panicBtn').style.display = 'block';
                if(force) alert("O Supabase continua bloqueado. Tente 4G ou Aba Anônima.");
                return false;
            }
        }

        async function doAction(type) {
            if (!engine && !checkEngine()) return;

            if (type === 'login') {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                if (!e || !p) return alert("Preencha e-mail e senha.");
                
                logger.innerText = "⏳ Autenticando com o servidor...";
                const { data, error } = await engine.auth.signInWithPassword({ email: e, password: p });
                if (error) {
                    alert("Acesso negado: " + error.message);
                    logger.innerText = "Erro no Login.";
                } else {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('configArea')?.style.display = 'block'; // Failsafe
                    document.getElementById('configForm').style.display = 'block';
                    logger.innerText = "Conectado como: " + data.user.email;
                    
                    const m = data.user.user_metadata || {};
                    document.getElementById('p_name').value = m.partner_name || '';
                    document.getElementById('p_color').value = m.partner_color || '';
                    document.getElementById('p_logo').value = m.partner_logo || '';
                    document.getElementById('p_wa').value = m.partner_whatsapp || '';
                }
            } else if (type === 'save') {
                logger.innerText = "💾 Gravando no banco de dados...";
                const m = {
                    partner_name: document.getElementById('p_name').value,
                    partner_color: document.getElementById('p_color').value,
                    partner_logo: document.getElementById('p_logo').value,
                    partner_whatsapp: document.getElementById('p_wa').value,
                    is_enterprise: true
                };
                const { error } = await engine.auth.updateUser({ data: m });
                if (error) alert(error.message); else alert("✅ SUCESSO! Estilo gravado. Reinicie o App Enterprise.");
                logger.innerText = "Pronto!";
            }
        }

        // Tenta ligar o motor após 2 segundos
        setTimeout(checkEngine, 2000);
    </script>
</body>
</html>
