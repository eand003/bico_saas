<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Rescue Dashboard</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background: #eef2f6; }
        .box { background: white; max-width: 400px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        button { width: 90%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .primary { background: #0f172a; color: white; margin-top: 10px; }
        .success { background: #16a34a; color: white; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🚀 Novo Painel Administrativo</h2>
        <div id="status" style="font-size:12px; font-weight:bold; color:red; margin-bottom:10px;">Verificando conexão...</div>

        <!-- LOGIN -->
        <div id="loginArea">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="primary" onclick="doLogin()">ACESSAR AGORA</button>
        </div>

        <!-- CONFIG -->
        <div id="configArea" style="display:none;">
            <p style="color:green; font-weight:bold;">✅ Conectado</p>
            <input type="text" id="p_name" placeholder="Nome Loja">
            <input type="text" id="p_color" placeholder="Cor (Ex: #ff0000)">
            <input type="text" id="p_logo" placeholder="URL Logo">
            <input type="text" id="p_wa" placeholder="WhatsApp">
            <button class="success" id="btnSave" onclick="doSave()" style="display:block;">SALVAR CONFIGURAÇÃO</button>
            <button onclick="location.reload()" style="background:none; color:red; font-size:11px; margin-top:20px; font-weight:bold;">LOGOUT / SAIR</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjouahzglomvvcfpxtuq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qb3VhaHpnbG9tdnZjZnB4dHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU3OTIsImV4cCI6MjA5MDIxMTc5Mn0.6SgPDABbRknn42mx1CnM67_P8O3Z7tqIGmQ7tn-M_bo';
        let supabase;

        async function init() {
            if (typeof window.supabase === 'undefined') {
                document.getElementById('status').innerText = "❌ ERRO: Supabase não carregou.";
                return;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const { data: { user } } = await supabase.auth.getUser();
            if (user) showConfig(user); else document.getElementById('status').innerText = "Aguardando Login...";
        }

        async function doLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Erro: " + error.message); else showConfig(data.user);
        }

        function showConfig(user) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('configArea').style.display = 'block';
            document.getElementById('status').innerText = "Dashboard Ativo!";
            document.getElementById('status').style.color = "green";
            const m = user.user_metadata || {};
            document.getElementById('p_name').value = m.partner_name || '';
            document.getElementById('p_color').value = m.partner_color || '';
            document.getElementById('p_logo').value = m.partner_logo || '';
            document.getElementById('p_wa').value = m.partner_whatsapp || '';
        }

        async function doSave() {
            const btn = document.getElementById('btnSave');
            btn.innerText = "Gravando...";
            const meta = {
                partner_name: document.getElementById('p_name').value,
                partner_color: document.getElementById('p_color').value,
                partner_logo: document.getElementById('p_logo').value,
                partner_whatsapp: document.getElementById('p_wa').value,
                is_enterprise: true
            };
            const { error } = await supabase.auth.updateUser({ data: meta });
            if (error) alert(error.message); else alert("SUCESSO! Reinicie o App Enterprise.");
            btn.innerText = "SALVAR CONFIGURAÇÃO";
        }

        window.onload = init;
    </script>
</body>
</html>
